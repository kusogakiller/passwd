<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RustCrypt</title>

<style>
:root{
  --bg:#f6f7f9;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:800px;
  margin:0 auto;
  padding:60px 20px;
}

h1{
  margin:0 0 6px;
  font-size:38px;
}

.subtitle{
  color:var(--muted);
  margin-bottom:30px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
}

.row{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:15px;
}

button{
  border:1px solid var(--border);
  background:#111827;
  color:white;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}

button.secondary{
  background:white;
  color:#111827;
}

small{
  color:var(--muted);
}

pre{
  background:#f9fafb;
  border:1px solid var(--border);
  padding:12px;
  border-radius:8px;
  overflow:auto;
}

.label{
  font-size:12px;
  color:var(--muted);
  margin:12px 0 6px;
}

footer{
  margin-top:30px;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<h1>RustCrypt</h1>
<div class="subtitle">Secure entropy-based password generation in Rust.</div>

<div class="card">

  <div class="row">
    <button onclick="load()">Refresh</button>
    <button class="secondary" onclick="clearOut()">Clear</button>
    <small id="status">Idle</small>
  </div>

  <div id="out">
    <small>Generate data using: rustcrypt generate 32 / 64</small>
  </div>

</div>

<footer>
Safe. Fast. Cryptographic.
</footer>

</div>

<script>
function setStatus(t){
  document.getElementById("status").innerText = t;
}

function clearOut(){
  document.getElementById("out").innerHTML = "<small>Cleared</small>";
}

function load(){
  setStatus("Loading...");
  document.getElementById("out").innerHTML = "<small>Reading output.json...</small>";

  fetch("output.json?ts=" + Date.now())
    .then(r => r.json())
    .then(d => {
      setStatus("Done");

      document.getElementById("out").innerHTML = `
        <div>

          <div class="label">SHA-256 (Lower HEX)</div>
          <pre>${d.sha256 ?? d.base64 ?? ""}</pre>

          <div class="label">BLAKE3 (Lower HEX)</div>
          <pre>${d.ripemd128 ?? ""}</pre>

        </div>
      `;
    })
    .catch(() => {
      setStatus("Error");
      document.getElementById("out").innerHTML =
        "<small>Failed to load output.json</small>";
    });
}
</script>

</body>
</html>
